<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Museum | Photo Detail</title>
    <meta name="theme-color" content="#F7F4F1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <script src="/shared/js/music.js"></script>

    <main class="detail-page">
      <header class="topbar">
        <a class="back-btn" href="../index.html" aria-label="Back"> ← </a>

        <div class="topbar-copy">
          <p class="eyebrow">OUR MUSEUM</p>
          <h1>Photo Detail</h1>
        </div>

        <button
          class="icon-btn"
          type="button"
          aria-label="Share photo"
          id="shareBtn"
        >
          ↗
        </button>
      </header>

      <section class="photo-stage" id="photoStage" aria-label="Featured photo">
        <div class="stage-glow"></div>

        <div class="stage-overlay">
          <span class="stage-pill" id="albumPill">Opening Chapter</span>
          <span class="stage-pill stage-pill-soft" id="photoCounter"
            >1 / 12</span
          >
        </div>

        <img
          id="heroPhoto"
          class="hero-photo"
          src=""
          alt="Featured memory"
          loading="eager"
          decoding="async"
        />
      </section>

      <section class="action-dock" aria-label="Photo actions">
        <button
          class="dock-btn"
          type="button"
          id="prevBtn"
          aria-label="Previous photo"
        >
          ‹
        </button>

        <button
          class="dock-btn dock-btn-primary"
          type="button"
          id="infoBtn"
          aria-label="Open info"
        >
          Info
        </button>

        <button
          class="dock-btn"
          type="button"
          id="shareBtn2"
          aria-label="Share photo"
        >
          ↗
        </button>

        <button
          class="dock-btn"
          type="button"
          id="nextBtn"
          aria-label="Next photo"
        >
          ›
        </button>
      </section>

      <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>

      <section
        class="info-sheet"
        id="infoSheet"
        aria-hidden="true"
        aria-label="Photo information"
      >
        <div class="sheet-handle" aria-hidden="true"></div>

        <div class="sheet-head">
          <div>
            <p class="sheet-kicker" id="sheetAlbum">Memory</p>
            <h2 id="sheetTitle">Choose a memory</h2>
          </div>

          <button
            class="sheet-close"
            type="button"
            id="closeSheetBtn"
            aria-label="Close info"
          >
            ✕
          </button>
        </div>

        <p class="sheet-story" id="sheetStory">
          Pilih foto di atas untuk melihat cerita di balik memory ini.
        </p>

        <div class="sheet-meta" id="sheetMeta"></div>

        <div class="sheet-tags" id="sheetTags"></div>

        <a
          class="sheet-map"
          id="sheetMap"
          href="#"
          target="_blank"
          rel="noreferrer"
        >
          Open location
        </a>
      </section>

      <div class="toast" id="toast" hidden></div>
    </main>

    <script src="/shared/data/gallery.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
