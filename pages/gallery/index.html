<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Museum | Gallery</title>
    <meta name="theme-color" content="#F7F4F1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <script src="/shared/js/music.js"></script>

    <main class="gallery-page">
      <header class="topbar">
        <a
          class="back-btn"
          href="../lobby/index.html"
          aria-label="Kembali ke lobby"
        >
          ←
        </a>

        <div class="topbar-copy">
          <p class="eyebrow">OUR MUSEUM</p>
          <h1>Gallery Room</h1>
        </div>

        <button
          class="icon-btn"
          type="button"
          aria-label="Jump to photo wall"
          id="browseBtn"
        >
          ⌕
        </button>
      </header>

      <section class="intro">
        <div>
          <p class="hero-kicker">Collection of memories</p>
          <h2>Setiap foto punya cerita.</h2>
        </div>

        <div class="view-switch" aria-label="Gallery views">
          <button class="view-pill active" type="button">Photos</button>
          <a
            class="view-pill"
            href="./album/index.html"
            data-route="collections"
          >
            Collections
          </a>
        </div>
      </section>

      <section
        class="photo-wall"
        id="photoWall"
        aria-label="Photo wall"
      ></section>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <a class="nav-item" href="../lobby/index.html">
          <span>⌂</span>
          <small>Lobby</small>
        </a>

        <a class="nav-item active" href="./index.html">
          <span>🖼</span>
          <small>Gallery</small>
        </a>

        <a class="nav-item" href="./album/index.html" data-route="collections">
          <span>▦</span>
          <small>Collections</small>
        </a>

        <a class="nav-item" href="../music/index.html">
          <span>🎵</span>
          <small>Music</small>
        </a>

        <a class="nav-item" href="../statistics/index.html">
          <span>📊</span>
          <small>Stats</small>
        </a>
      </nav>
    </main>

    <script src="/shared/data/gallery.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
