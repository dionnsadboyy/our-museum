<!doctype html>
<html lang="id" data-view="videos">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Museum | Videos</title>
    <meta name="theme-color" content="#F7F4F1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-view="videos">
    <script src="/shared/js/music.js"></script>

    <main class="gallery-page">
      <header class="topbar">
        <a class="back-btn" href="../index.html" aria-label="Back to gallery"
          >←</a
        >

        <div class="topbar-copy">
          <p class="eyebrow">OUR MUSEUM</p>
          <h1>Video Room</h1>
        </div>

        <button
          class="icon-btn"
          type="button"
          aria-label="Music controls"
          id="musicToggleBtn"
        >
          ♫
        </button>
      </header>

      <section class="intro">
        <div>
          <p class="hero-kicker">Moving memories</p>
          <h2>Video dulu, cerita belakangan.</h2>
        </div>

        <div class="view-switch" aria-label="Gallery views">
          <a class="view-pill" href="../index.html" data-view="photos"
            >Photos</a
          >
          <button class="view-pill active" type="button" data-view="videos">
            Videos
          </button>
          <a
            class="view-pill"
            href="../album/index.html"
            data-view="collections"
            >Collections</a
          >
        </div>
      </section>

      <section
        class="media-wall"
        id="mediaWall"
        aria-label="Video wall"
      ></section>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <a class="nav-item" href="../../lobby/index.html">
          <span>⌂</span>
          <small>Lobby</small>
        </a>

        <a class="nav-item" href="../index.html">
          <span>🖼</span>
          <small>Gallery</small>
        </a>

        <a class="nav-item active" href="./index.html">
          <span>▶</span>
          <small>Videos</small>
        </a>

        <a class="nav-item" href="../album/index.html">
          <span>▦</span>
          <small>Collections</small>
        </a>

        <a class="nav-item" href="../../statistics/index.html">
          <span>📊</span>
          <small>Stats</small>
        </a>
      </nav>
    </main>

    <div class="music-backdrop" id="musicBackdrop" hidden></div>
    <section
      class="music-sheet"
      id="musicSheet"
      aria-hidden="true"
      role="dialog"
      aria-label="Music controls"
    >
      <div class="music-sheet__handle" aria-hidden="true"></div>

      <div class="music-sheet__header">
        <div>
          <p class="music-kicker">MUSEUM AMBIENCE</p>
          <h4>Now Playing</h4>
        </div>

        <button
          class="music-sheet__close"
          type="button"
          id="musicCloseBtn"
          aria-label="Close music controls"
        >
          ✕
        </button>
      </div>

      <div class="music-now">
        <div class="music-art" aria-hidden="true">🏛</div>
        <div class="music-meta">
          <strong id="musicTitle">museum.mp3</strong>
          <span id="musicStatus">tap play to start</span>
        </div>
      </div>

      <div class="music-progress">
        <div class="music-progress__track">
          <div class="music-progress__fill" id="musicProgressFill"></div>
        </div>
        <div class="music-time" id="musicTime">0:00 / 0:00</div>
      </div>

      <div class="music-actions">
        <button class="music-play" type="button" id="musicPlayBtn">Play</button>

        <label class="music-volume">
          <span>Vol</span>
          <input type="range" min="0" max="1" step="0.01" id="musicVolume" />
        </label>
      </div>
    </section>

    <script src="/shared/data/gallery.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
