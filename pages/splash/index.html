<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Museum</title>
    <meta name="theme-color" content="#F7F4F1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="splash" aria-label="Our Museum splash screen">
      <div class="bg-orb orb-purple"></div>
      <div class="bg-orb orb-pink"></div>
      <div class="grain"></div>

      <section class="splash-card">
        <div class="museum-mark" aria-hidden="true">
          <span class="mark-line"></span>
          <span class="mark-shape">🏛</span>
          <span class="mark-line"></span>
        </div>

        <p class="eyebrow">PRIVATE MEMORY MUSEUM</p>

        <h1 class="title">OUR MUSEUM</h1>

        <p class="tagline">Every memory deserves a place.</p>

        <div class="heart-wrap" aria-hidden="true">
          <span class="heart">♡</span>
        </div>

        <div class="loading-wrap" aria-live="polite" aria-atomic="true">
          <span class="loading-text" id="loadingText">Opening Museum</span>
          <span class="loading-dots" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
