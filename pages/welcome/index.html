<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Museum | Welcome</title>
    <meta name="theme-color" content="#F7F4F1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <script src="/shared/js/music.js"></script>
    <main class="welcome-page">
      <div class="bg-orb orb-purple"></div>
      <div class="bg-orb orb-pink"></div>
      <div class="grain"></div>

      <section class="welcome-card">
        <div class="top-badge">
          <span class="dot"></span>
          <span>PRIVATE MUSEUM</span>
        </div>

        <div class="hero-mark" aria-hidden="true">
          <span class="line"></span>
          <span class="icon">🏛</span>
          <span class="line"></span>
        </div>

        <p class="eyebrow">WELCOME TO</p>
        <h1 class="title">OUR MUSEUM</h1>

        <p class="subtitle">every memory deserves a place.</p>

        <div class="info-box">
          <div class="info-label">Established</div>
          <div class="info-value">June 2026</div>
        </div>

        <div class="quote">
          “Some moments deserve more than a gallery. They deserve a museum.”
        </div>

        <a class="enter-btn" href="../lobby/index.html" id="enterMuseum">
          <span>Enter Museum</span>
          <i>→</i>
        </a>

        <p class="footer-note">Curated for Dion & Chelsea</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
